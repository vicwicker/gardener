apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: verticalpodautoscaler
spec:
  groups:
  - name: verticalpodautoscaler.rules
    rules:
    - alert: VerticalPodAutoscalerCappedRecommendation
      expr: |2-
          (
              {__name__=~"kube_customresource_verticalpodautoscaler_status_recommendation_containerrecommendations_uncappedtarget_.+"}
            >
              0
          )
        >
          (
              {__name__=~"kube_customresource_verticalpodautoscaler_status_recommendation_containerrecommendations_target_.+"}
            >
              0
          )
      labels:
        severity: warning
        type: shoot
        visibility: operator
      annotations:
        summary: A VPA recommendation is capped.
        description: >-
          The {{ $labels.verticalpodautoscaler }} VPA
          in the {{ $labels.namespace }} namespace
          in the {{ $externalLabels.cluster }} cluster has a
          {{ if eq .Labels.unit "core" -}}
          CPU
          {{- else if eq .Labels.unit "byte" -}}
          memory
          {{- end }}
          uncapped target recommendation larger than the regular target
          recommendation for the {{ $labels.container }} container.
